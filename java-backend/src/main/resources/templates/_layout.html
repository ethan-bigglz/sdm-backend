<!DOCTYPE html>
<html lang="en" th:fragment="page(content, footer)">
    <head>
        <title>SDM Endpoint</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
        <th:block th:if="${demo_mode}">
            <!-- Global site tag (gtag.js) - Google Analytics -->
            <script async src="https://www.googletagmanager.com/gtag/js?id=G-6FS197PR54"></script>
            <script>
                window.dataLayer = window.dataLayer || [];
                function gtag(){dataLayer.push(arguments);}
                gtag('js', new Date());
                gtag('config', 'G-6FS197PR54');
            </script>
        </th:block>
    </head>
    <body>
        <div class="container mt-2 mb-2">
            <!-- Insert content fragment here -->
            <th:block th:replace="${content}"></th:block>

            <div class="mt-2">
                <th:block th:if="${demo_mode}">
                    <div class="alert alert-info">
                        Source code: <a href="https://github.com/nfc-developer/sdm-backend">https://github.com/nfc-developer/sdm-backend</a>
                    </div>

                    <div class="alert alert-success">
                        Do you want to use SDM in your project? Not sure how to do it? Fill out the <strong><a href="https://nfcdeveloper.com/contact/">contact form</a></strong> or please drop us a short e-mail at <a href="mailto:hello@nfcdeveloper.com">hello@nfcdeveloper.com</a>
                    </div>
                </th:block>

                <!-- Footer fragment -->
                <th:block th:if="${footer}" th:replace="${footer}"></th:block>
                <th:block th:unless="${footer}">
                    <hr>
                    <p class="text-muted">
                        Powered by Arx Research, Inc.
                    </p>
                    <a href="https://arx.org"><img src="https://nfcdeveloper.com/assets/img/arx.svg" style="width: 6em;" alt="Arx Company Logo"></a>
                </th:block>
            </div>
        </div>
    </body>
</html>
