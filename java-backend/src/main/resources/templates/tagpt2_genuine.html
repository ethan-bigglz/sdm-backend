<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>정품 인증 (Genuine Authentication)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script>
        // Hide query parameters from address bar to secure sensitive validation info
        if (window.history && window.history.replaceState) {
            var cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({path: cleanUrl}, document.title, cleanUrl);
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Noto+Sans+KR:wght@500;700;900&display=swap');

        :root {
            /* Success Colors (Gold) */
            --bg-center: #1a1a2e;
            --bg-edge: #0f0f1a;
            --plaque-base: #FFD700;
            --plaque-mid: #B8860B;
            --plaque-border: #FFF8DC;
            --plaque-text-start: #FFF8DC;
            --plaque-text-mid: #FFD700;
            --plaque-text-end: #B8860B;
            --glow-color: rgba(212,175,55,0.4);
            --icon-bg: #4CAF50;
            --msg-color: #4CAF50;
        }

        body.fail-mode {
            /* Fail Colors (Red) */
            --bg-center: #2a0b12;
            --bg-edge: #150205;
            --plaque-base: #ff4d4d;
            --plaque-mid: #cc0000;
            --plaque-border: #ffcccc;
            --plaque-text-start: #ffcccc;
            --plaque-text-mid: #ff4d4d;
            --plaque-text-end: #cc0000;
            --glow-color: rgba(255,50,50,0.6);
            --icon-bg: #f44336;
            --msg-color: #f44336;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--bg-center) 0%, var(--bg-edge) 100%);
            color: #ffffff;
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            padding: 0 5vw;
            box-sizing: border-box;
        }

        /* Ambient glowing background */
        .glow-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vw;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle, var(--glow-color) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            z-index: 1;
            animation: pulse-bg 3s infinite alternate;
        }

        @keyframes pulse-bg {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        body.fail-mode .glow-bg {
            animation: pulse-fail 1.5s infinite alternate;
        }
        @keyframes pulse-fail {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        }

        .plaque-wrapper {
            position: relative;
            display: inline-flex;
            margin-bottom: 2rem;
            animation: float 5s ease-in-out infinite;
            justify-content: center;
            align-items: center;
        }
        
        body.fail-mode .plaque-wrapper {
            animation: shake 5s ease-in-out infinite;
        }

        /* The Plaque */
        .plaque {
            width: clamp(200px, 60vw, 260px);
            height: clamp(200px, 60vw, 260px);
            margin: 0 auto;
            position: relative;
            background: linear-gradient(135deg, var(--plaque-base) 0%, var(--plaque-mid) 50%, var(--plaque-base) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px var(--glow-color), inset 0 0 20px rgba(255,255,255,0.3);
            border: clamp(4px, 1.5vw, 8px) solid var(--plaque-border);
            z-index: 2;
            overflow: hidden;
        }

        .plaque::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        .plaque-inner {
            background: radial-gradient(circle at top left, #333, #111);
            width: 85%;
            height: 85%;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: clamp(2px, 1vw, 4px) solid var(--plaque-mid);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            z-index: 3;
        }

        .plaque-text {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--plaque-text-start) 0%, var(--plaque-text-mid) 50%, var(--plaque-text-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 8px rgba(0,0,0,0.6);
            margin: 0;
            line-height: 1.1;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .plaque-sub {
            font-size: clamp(0.75rem, 3vw, 1rem);
            color: var(--plaque-mid);
            margin-top: 5px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        
        @keyframes shake {
            0% { transform: translateY(0px) rotate(0deg); }
            5% { transform: translateY(-5px) rotate(-2deg); }
            10% { transform: translateY(5px) rotate(2deg); }
            15% { transform: translateY(-5px) rotate(-2deg); }
            20% { transform: translateY(5px) rotate(2deg); }
            25% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: clamp(1rem, 5vw, 2rem);
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box;
        }

        .info-card h2 {
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            margin-top: 0;
            margin-bottom: 1.2rem;
            color: var(--plaque-text-mid);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
            word-break: break-word;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            font-size: clamp(0.85rem, 3.5vw, 0.95rem);
        }

        .info-label {
            color: #a0a0b0;
            font-weight: 500;
        }

        .info-value {
            color: #ffffff;
            font-weight: 700;
            font-family: 'Outfit', monospace;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 6px;
            letter-spacing: 1px;
            word-break: break-all;
            max-width: 60%;
            text-align: right;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0px); }
        }
        
        .status-text {
            color: var(--msg-color);
            font-weight: 700;
            margin-top: 1.5rem;
            font-size: clamp(1rem, 4vw, 1.1rem);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            animation: fadeIn 0.8s ease-in-out 0.5s both;
            flex-wrap: wrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .icon-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: var(--icon-bg);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
        }

        /* Sparkles effect */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px 2px white;
            opacity: 0;
            animation: sparkle-anim 2s linear infinite;
        }
        
        body.fail-mode .sparkle {
            background: #ffcccc;
            box-shadow: 0 0 10px 2px #ff4d4d;
        }

        .sparkle-1 { top: 10%; left: 20%; width: 4px; height: 4px; animation-delay: 0s; }
        .sparkle-2 { top: 80%; left: 80%; width: 3px; height: 3px; animation-delay: 0.5s; }
        .sparkle-3 { top: 20%; left: 80%; width: 5px; height: 5px; animation-delay: 1s; }
        .sparkle-4 { top: 80%; left: 20%; width: 4px; height: 4px; animation-delay: 1.5s; }

        @keyframes sparkle-anim {
            0% { transform: scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: scale(1); opacity: 0; }
        }

        .genuine-mark {
            position: absolute;
            bottom: -15px;
            right: -15px;
            width: clamp(80px, 25vw, 120px);
            height: auto;
            z-index: 10;
            transform: rotate(-15deg);
            animation: stampIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.5s backwards, sparkle-sticker 1.5s infinite alternate 1.1s;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
            object-fit: contain;
        }

        @keyframes sparkle-sticker {
            0% { filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)) brightness(1); }
            100% { filter: drop-shadow(0 10px 25px rgba(255,215,0,0.9)) brightness(1.2) drop-shadow(0 0 15px rgba(255,255,255,0.8)); }
        }

        @keyframes stampIn {
            0% { transform: scale(3) rotate(-60deg); opacity: 0; filter: drop-shadow(0 30px 30px rgba(0,0,0,0.8)); }
            100% { transform: scale(1) rotate(-15deg); opacity: 1; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }
        }

    </style>
</head>
<body th:class="${is_valid} ? 'success-mode' : 'fail-mode'">
    <div class="glow-bg"></div>
    <div class="container">
        
        <div class="plaque-wrapper">
            <div class="sparkle sparkle-1"></div>
            <div class="sparkle sparkle-2"></div>
            <div class="sparkle sparkle-3"></div>
            <div class="sparkle sparkle-4"></div>

            <div class="plaque">
                <div class="plaque-inner">
                    <th:block th:if="${is_valid}">
                        <p class="plaque-text" style="font-size: clamp(1.8rem, 6vw, 3.2rem);">인증 완료</p>
                        <p class="plaque-sub">Verified</p>
                    </th:block>
                    <th:block th:unless="${is_valid}">
                        <p class="plaque-text" style="font-size: clamp(2rem, 6vw, 3.5rem);">인증 실패</p>
                        <p class="plaque-sub">Failed</p>
                    </th:block>
                </div>
            </div>

            <th:block th:if="${is_valid}">
                <img class="genuine-mark" th:src="@{/images/certified_sticker.png}" alt="Certified Sticker">
            </th:block>
        </div>

        <div class="info-card">
            <h2 th:if="${is_valid}">Authentication Valid</h2>
            <h2 th:unless="${is_valid}">Authentication Error</h2>
            
            <div class="info-item">
                <span class="info-label">UID</span>
                <span class="info-value" th:text="(${uid} != null and ${uid} != 'UNKNOWN') ? ${uid} : 'N/A'">N/A</span>
            </div>
            
            <th:block th:if="${is_valid}">
                <div class="info-item">
                    <span class="info-label">Read Counter</span>
                    <span class="info-value" th:text="${read_ctr_num}">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Enc Mode</span>
                    <span class="info-value" th:text="${encryption_mode}">AES</span>
                </div>
                <div class="status-text">
                    <span class="icon-circle">✔</span>
                    Successfully Authenticated
                </div>
            </th:block>
            <th:block th:unless="${is_valid}">
                <div class="info-item" style="flex-direction: column; align-items: flex-start; text-align: left; margin-top: 1rem;">
                    <span class="info-label" style="margin-bottom: 6px;">Error Detail</span>
                    <span class="info-value" style="color: #ffcccc; background: rgba(255,0,0,0.1); width: 100%; max-width: 100%; box-sizing: border-box; font-size: clamp(0.75rem, 3vw, 0.85rem);" th:text="${error_msg}">Error occurred</span>
                </div>
                <div class="status-text">
                    <span class="icon-circle">✖</span>
                    Verification Failed
                </div>
            </th:block>
        </div>

    </div>
</body>
</html>
